name: CI

on:
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for likely secrets
        run: |
          if git diff --unified=0 origin/main...HEAD | grep -EI "(api[_-]?key|secret|password|token)\s*[:=]\s*['\"][A-Za-z0-9_\-]{12,}['\"]"; then
            echo "Potential secret detected in diff — failing build."
            exit 1
          fi

  dotnet:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: capacity_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        working-directory: api
        run: dotnet restore
      - name: Build
        working-directory: api
        run: dotnet build --no-restore --configuration Release
      - name: Unit + integration tests
        working-directory: api
        env:
          ConnectionStrings__CapacityDb: "Server=127.0.0.1;Port=3306;Database=capacity_test;User=root;Password=root;"
          # CI-only test signing key - not a production secret, never used
          # outside this ephemeral test run. Production keys follow the
          # CLAUDE.md secrets convention (GitHub Actions encrypted secrets).
          Jwt__SigningKey: "ci-test-only-signing-key-not-for-production-use-0123456789"
        run: dotnet test --no-build --configuration Release --verbosity normal

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build
      - name: Unit tests
        working-directory: web
        run: npm test

  playwright:
    runs-on: ubuntu-latest
    needs: [dotnet, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      # Step-level if: (valid here, unlike job-level if:, since checkout has
      # already run by this point) - Playwright tests land in Phase 5/6.
      # These steps skip cleanly until web/playwright.config.ts exists.
      - name: Install Playwright browsers
        if: ${{ hashFiles('web/playwright.config.ts') != '' }}
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        if: ${{ hashFiles('web/playwright.config.ts') != '' }}
        working-directory: web
        run: npx playwright test
